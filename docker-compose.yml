version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: argus-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data/ledger:/app/data/ledger
      - ./data/vector_store:/app/data/vector_store
      - ./data/trust_calibration:/app/data/trust_calibration
    environment:
      - PYTHONUNBUFFERED=1
      - APP_NAME=ARGUS
      - APP_VERSION=1.0.0
      - CORS_ORIGINS=http://localhost,http://localhost:80,http://localhost:5173
    restart: unless-stopped
    networks:
      - argus-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: argus-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://backend:8000
    restart: unless-stopped
    networks:
      - argus-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  argus-network:
    driver: bridge

volumes:
  argus-data:
