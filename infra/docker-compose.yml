version: '3.9'

services:
  backend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.backend
    container_name: argus-backend
    ports:
      - "8000:8000"
    environment:
      APP_ENV: production
      API_HOST: 0.0.0.0
      API_PORT: 8000
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.frontend
    container_name: argus-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
